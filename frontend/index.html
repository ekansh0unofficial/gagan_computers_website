<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dukaan — Electronics & Gadgets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Preload critical CSS to eliminate flash -->
  <link rel="preload" href="styles/variables.css" as="style" />
  <link rel="preload" href="styles/base.css" as="style" />
  <link rel="preload" href="styles/components.css" as="style" />
  <link rel="preload" href="styles/layout.css" as="style" />

  <!-- Google Fonts — tech theme -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Stylesheets in dependency order -->
  <link rel="stylesheet" href="styles/variables.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/admin.css" />

  <!-- Anti-flash: hide body until CSS is parsed -->
  <style>
    body { visibility: hidden; background: #0b0f1a; }
  </style>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      document.body.style.visibility = "visible";
    });
  </script>
</head>
<body>

  <!-- ── Navigation ── -->
  <header class="nav-bar">
    <div class="nav-inner">
      <button class="nav-logo" onclick="App.navigate('home')">
        <span class="logo-icon">🛍</span>
        <span class="logo-text" id="shopName">Dukaan</span>
      </button>

      <div class="search-wrapper">
        <div class="search-box">
          <span class="search-icon">⌕</span>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search products..."
            autocomplete="off"
          />
          <button class="search-clear" id="searchClear" onclick="Search.clear()">✕</button>
        </div>
        <div class="search-suggestions" id="searchSuggestions"></div>
      </div>

      <div class="nav-actions">
        <button class="nav-btn cart-btn" onclick="Cart.open()" id="cartBtn">
          <span>🛒</span>
          <span class="cart-badge" id="cartBadge" style="display:none">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ── Page Container ── -->
  <main id="pageContainer">
    <!-- Pages are injected here by router -->
  </main>

  <!-- ── Cart Drawer ── -->
  <div class="overlay" id="overlay" onclick="Cart.close()"></div>
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="close-btn" onclick="Cart.close()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer" id="cartFooter"></div>
  </aside>

  <!-- ── Toast ── -->
  <div class="toast" id="toast"></div>

  <!-- ── Modal ── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal"></div>
  </div>

  <!-- ── Scripts (order matters) ── -->
  <script src="components/api.js"></script>
  <script src="components/search.js"></script>
  <script src="components/cart.js"></script>
  <script src="components/product-card.js"></script>
  <script src="pages/home.js"></script>
  <script src="pages/admin.js"></script>
  <script src="pages/checkout.js"></script>
  <script src="components/app.js"></script>
</body>
</html>
